<po-page-default
  p-title="Resultado da Importação"
  [p-actions]="[
    { label: 'Nova Importação', action: voltar.bind(this), icon: 'po-icon-refresh' }
  ]">

  @if (resultado) {
    <div class="po-row" style="margin-bottom: 16px;">

      <div class="po-md-3">
        <po-info
          p-label="Total Enviado"
          [p-value]="resultado.total + ''">
        </po-info>
      </div>

      <div class="po-md-3">
        <po-info
          p-label="✅ Sucesso"
          [p-value]="resultado.sucesso + ''">
        </po-info>
      </div>

      <div class="po-md-3">
        <po-info
          p-label="❌ Erros"
          [p-value]="resultado.erros + ''">
        </po-info>
      </div>

      <div class="po-md-3">
        <po-info
          p-label="⚠️ Duplicados"
          [p-value]="resultado.duplicados + ''">
        </po-info>
      </div>

    </div>
  }

  <po-divider p-label="Detalhamento por Pedido"></po-divider>

  @if (resultado) {
    <div class="po-row">
      <div class="po-md-12">
        <po-table
          [p-columns]="tableColumns"
          [p-items]="itens"
          p-striped="true"
          p-sort="true">
        </po-table>
      </div>
    </div>
  }

</po-page-default>
